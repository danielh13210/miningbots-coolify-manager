<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mining Bots</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <link href="/static/styles.css" rel="stylesheet" />
  <script src="/static/start_stop.js"></script>
</head>

<body>
  <div id="navbar-peek-triggerbox"></div>
  <nav class="navbar navbar-expand-lg navbar-light bg-light competition-disabled">
    <img src="/static/favicon.ico" alt="tinkercademy logo" class="navbar-brand-logo">
    <a class="navbar-brand" href="#">Mining Bots</a>
  </nav>
  <h1>Details of instance {{instance}}</h1>
  {% if instances[instance]['running'] %}
    <button onclick="stop_clicked('{{instance}}');" id="stop-{{instance}}">Stop</button>
  {% else %}
    <button onclick="start_clicked('{{instance}}');" id="start-{{instance}}">Start</button>
  {% endif %}
  <button onclick="delete_clicked('{{instance}}')" {{'disabled="true" title="Instance is running, must be stopped to delete."' if instances[instance]['running']}} id="delete-{{instance}}">Delete</button>

</body>
