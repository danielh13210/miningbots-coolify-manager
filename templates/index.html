<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instance Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <link href="/static/styles.css" rel="stylesheet" />
</head>

<body>
  <div id="navbar-peek-triggerbox"></div>
  <nav class="navbar navbar-expand-lg navbar-light bg-light competition-disabled">
    <img src="/static/favicon.ico" alt="tinkercademy logo" class="navbar-brand-logo">
    <a class="navbar-brand navbar-collapse" href="/">Instance Manager</a>
    <div id="navbarLogoutDropdown">
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="collapse-if-minified nav-link dropdown-toggle" href="#" id="navbarLogoutDropdownMenuLink" role="button"
            data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <img src="/static/user.svg" class="icon" alt="User menu" title="User menu">
          </a>
          <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownMenuLink">
            <span class="dropdown-item-text">{{username}}</span>
            <a class="dropdown-item" href="/logout" id="logout-button">
              Log Out
              <img src="/static/logout.svg" class="icon" alt="Logout" title="Logout">
            </a>
          </div>
        </li>
      </ul>
    </div>
  </nav>
  <div class="instances-row">
    <h1 class="title">Instances</h1>
    <button class="btn" onclick="window.open('/new', '_self')" ><img src="/static/add.svg" alt="New Instance"></button>
  </div>
  {% if instances %}
    {% for instance in instances %}
      <div class="instance-box" id="instancebox-{{instance}}">
        <span>Instance: {{instance}}</span>
        {% if instances[instance]['running'] %}
          <span class="running">Running</span>
        {% endif %}
        <br>
        <span
          {% if not instances[instance]["running"] %}
            title="Instance is not running, start it to open the frontend."
            class="btn-disabled-wrapper"
          {% endif %}
        >
          <button class="btn btn-primary"
            {% if not instances[instance]["running"] %}
              disabled
            {% endif %}
            onclick="window.open('{{frontend_url}}/?url={{instances[instance]['url']}}&observer_key={{instances[instance]['observer_key']}}&instance_name={{instance}}', '_blank')">
              Open Frontend
          </button>
        </span>
        <button class="btn btn-secondary" onclick="window.open('/details?instance={{instance}}', '_self')">More...</button>
      </div>
    {% endfor %}
  {% else %}
    <h2 id="no-instance">No instances.</h2>
  {% endif %}
  <script src="/static/tooltip.js"></script>
</body>

</html>
