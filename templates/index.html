<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instance Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <link href="/static/styles.css" rel="stylesheet" />
</head>

<body>
  <div id="navbar-peek-triggerbox"></div>
  <nav class="navbar navbar-expand-lg navbar-light bg-light competition-disabled">
    <img src="/static/favicon.ico" alt="tinkercademy logo" class="navbar-brand-logo">
    <a class="navbar-brand" href="/">Instance Manager</a>
  </nav>
  <h1 class="title">Instances</h1>
  {% if instances %}
    {% for instance in instances %}
      <div class="instance-box" id="instancebox-{{instance}}">
        <span>Instance: {{instance}}</span>
        {% if instances[instance]['running'] %}
          <span class="running">Running</span>
        {% endif %}
        <br>
        <button class="btn btn-primary" {{'disabled="true" title="Instance is not running"' if not instances[instance]["running"] else ''}} onclick="window.open('{{frontend_url}}/?url={{instances[instance]['url']}}&observer_key={{instances[instance]['observer_key']}}&instance_name={{instance}}', '_blank')">Open Frontend</button>
        <button class="btn btn-secondary" onclick="window.open('/details?instance={{instance}}', '_self')">More...</button>
      </div>
    {% endfor %}
  {% else %}
    <h2 id="no-instance">No instances.</h2>
  {% endif %}
  <button class="btn btn-primary" onclick="window.open('/new', '_self')">New Instance</button>
</body>

</html>
