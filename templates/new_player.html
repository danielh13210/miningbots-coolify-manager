<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instance Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <link href="/static/styles.css" rel="stylesheet" />
  <script src="/static/form_dirty.js"></script>
</head>

<body>
  <div id="navbar-peek-triggerbox"></div>
  <nav class="navbar navbar-expand-lg navbar-light bg-light competition-disabled">
    <img src="/static/favicon.ico" alt="tinkercademy logo" class="navbar-brand-logo">
    <a class="navbar-brand" href="/">Instance Manager</a>
  </nav>
  <form method="POST" enctype="multipart/form-data">
    <h1>Create New Player</h1>
    <p>On Instance: {{instance}}</p>
    <div>
        <label for="name">Player Name</label>
        <input type="hidden" id="instance" name="instance" value="{{instance}}">
        <input type="text" id="name" name="name" pattern="[a-zA-Z0-9_\.\-]+" title="Only letters, numbers, dashes, periods, and underscores allowed." maxlength="{{64-(instance|length+1)}}" required/>
    </div>
    <input type="submit" value="Continue" />
    {% if error %}
      <h3>{{error}}</h3>
    {% endif %}
    <script>
      attachSubmitButton(document.querySelector('form'));
    </script>
  </form>
</body>

</html>
